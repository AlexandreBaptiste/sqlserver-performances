services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: db-perf-sqlserver
    environment:
      ACCEPT_EULA: "Y"
      SA_PASSWORD: "YourStrong@Passw0rd"
      MSSQL_PID: "Developer"
    ports:
      - "1433:1433"
    volumes:
      - sqlserver-data:/var/opt/mssql
      - ./sql:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P 'YourStrong@Passw0rd' -C -Q 'SELECT 1'",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # One-shot init container: runs SQL scripts after SQL Server is healthy
  sqlserver-init:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: db-perf-init
    depends_on:
      sqlserver:
        condition: service_healthy
    volumes:
      - ./sql:/scripts:ro
    environment:
      SA_PASSWORD: "YourStrong@Passw0rd"
    command: >
      bash -c "
        /opt/mssql-tools18/bin/sqlcmd -S sqlserver -U sa -P 'YourStrong@Passw0rd' -C -i /scripts/00-create-databases.sql &&
        /opt/mssql-tools18/bin/sqlcmd -S sqlserver -U sa -P 'YourStrong@Passw0rd' -C -d DbNaive -i /scripts/01-schema-naive.sql &&
        /opt/mssql-tools18/bin/sqlcmd -S sqlserver -U sa -P 'YourStrong@Passw0rd' -C -d DbOptimized -i /scripts/02-schema-optimized.sql &&
        echo 'Database initialization complete.'
      "
    restart: "no"

volumes:
  sqlserver-data:
